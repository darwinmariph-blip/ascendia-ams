# =============================================================
#  Ascendia AMS — Docker Compose (Future Production Deployment)
#  Containerizes all services for VPS or on-premise deployment
# =============================================================
#  HOW TO USE (future production):
#  1. Install Docker Desktop
#  2. docker-compose up -d
#  3. Open http://localhost/dashboard.html
# =============================================================

version: '3.8'

services:

  # ── MySQL (Snipe-IT Database) ──────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ascendia_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: snipeit
      MYSQL_DATABASE: snipeit
      MYSQL_USER: snipeit
      MYSQL_PASSWORD: snipeit
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB (Maintenance Documents) ───────────────────────
  mongodb:
    image: mongo:6
    container_name: ascendia_mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ connectionStatus: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── InfluxDB (Device Telemetry) ────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: ascendia_influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ascendia2026
      DOCKER_INFLUXDB_INIT_ORG: ascendia
      DOCKER_INFLUXDB_INIT_BUCKET: ascendia_telemetry
    volumes:
      - influx_data:/var/lib/influxdb2
    ports:
      - "8181:8086"

  # ── Redis (Cache + Event Streaming) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: ascendia_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Snipe-IT Application ───────────────────────────────────
  snipeit:
    image: snipe/snipe-it:latest
    container_name: ascendia_snipeit
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: snipeit
      DB_USERNAME: snipeit
      DB_PASSWORD: snipeit
      APP_KEY: base64:REPLACE_WITH_YOUR_APP_KEY
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - snipeit_data:/var/lib/snipeit
    ports:
      - "8090:80"

  # ── FastAPI AI Service ─────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ascendia_api
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    environment:
      SNIPEIT_URL: http://snipeit
      MONGODB_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    volumes:
      - .:/app

# ── Volumes ────────────────────────────────────────────────
volumes:
  mysql_data:
  mongo_data:
  influx_data:
  snipeit_data:
