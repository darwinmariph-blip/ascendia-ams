<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ascendia IT Asset Management</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0F1117;--bg2:#181B24;--bg3:#1E2230;--border:rgba(255,255,255,0.07);--text:#E8EAF0;--text2:#8B90A0;--text3:#555B6E;--teal:#1D9E75;--teal-dim:rgba(29,158,117,0.15);--red:#E24B4A;--red-dim:rgba(226,75,74,0.15);--amber:#EF9F27;--amber-dim:rgba(239,159,39,0.15);--blue:#378ADD;--blue-dim:rgba(55,138,221,0.15);--radius:10px;--radius-lg:14px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .sidebar{position:fixed;top:0;left:0;width:300px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;z-index:100;overflow-y:auto}
    .sidebar-logo{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2rem;display:flex;align-items:center;gap:8px}
    .logo-icon { width:115px; height:115px; border-radius:0px; border-radius:7px; background:none; display:flex; align-items:center; justify-content:center; font-size:0px; background-image:url(logo.png); background-size:cover; background-position:center; }
    .nav-section{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin:1.25rem 0 .5rem .5rem}
    .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;margin-bottom:2px}
    .nav-item:hover{background:var(--bg3);color:var(--text)}
    .nav-item.active{background:var(--teal-dim);color:var(--teal)}
    .sidebar-footer{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
    .sidebar-footer strong{color:var(--text2);display:block;margin-bottom:2px}
    .main{margin-left:300px;padding:2rem;min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem}
    .page-title{font-size:20px;font-weight:500}
    .page-sub{font-size:13px;color:var(--text2);margin-top:2px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .btn{padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .15s;font-family:'DM Sans',sans-serif}
    .btn:hover{background:var(--bg3);color:var(--text)}
    .btn-primary{background:var(--teal);border-color:var(--teal);color:#fff}
    .btn-primary:hover{background:#18856A}
    .btn-danger{background:var(--red-dim);border-color:var(--red);color:var(--red)}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
    .metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem}
    .metric-card.alert{border-color:var(--red);background:var(--red-dim)}
    .metric-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .metric-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .metric-icon.teal{background:var(--teal-dim)}
    .metric-icon.blue{background:var(--blue-dim)}
    .metric-icon.red{background:var(--red-dim)}
    .metric-icon.amber{background:var(--amber-dim)}
    .metric-val{font-size:28px;font-weight:500;line-height:1;margin-bottom:4px}
    .metric-val.red{color:var(--red)}
    .metric-label{font-size:12px;color:var(--text2)}
    .grid3{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:14px}
    .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
    .card-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
    .tbl td{padding:10px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:var(--bg3)}
    .mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}
    .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500}
    .badge-high{background:var(--red-dim);color:var(--red)}
    .badge-medium{background:var(--amber-dim);color:var(--amber)}
    .badge-low{background:var(--teal-dim);color:var(--teal)}
    .badge-unscored{background:var(--bg3);color:var(--text3)}
    .badge-ready{background:var(--teal-dim);color:var(--teal)}
    .badge-maint{background:var(--red-dim);color:var(--red)}
    .badge-blue{background:var(--blue-dim);color:var(--blue)}
    .badge-deployed{background:var(--amber-dim);color:var(--amber)}
    .avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-dim);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
    .feed-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .feed-item:last-child{border-bottom:none}
    .feed-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
    .feed-text{font-size:13px;color:var(--text);line-height:1.5;flex:1}
    .feed-time{font-size:11px;color:var(--text3);white-space:nowrap}
    .health-bar-bg{background:var(--bg3);border-radius:99px;height:6px;flex:1;overflow:hidden}
    .health-bar-fill{height:6px;border-radius:99px;transition:width .3s}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Modal */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto}
    .modal-title{font-size:16px;font-weight:500;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
    .modal-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1}
    .form-group{margin-bottom:1rem}
    .form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
    .form-input{width:100%;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px}
    .form-input:focus{outline:none;border-color:var(--teal)}
    select.form-input{cursor:pointer}
    .form-row{display:flex;gap:10px}
    .form-row .form-group{flex:1}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1.25rem;font-size:13px;z-index:2000;animation:slideIn .2s ease}

    .toast.error{border-color:var(--red);color:var(--red)}

    .qr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .qr-asset-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;display:flex;flex-direction:column;align-items:center;gap:10px;transition:border-color .15s}
    .qr-asset-card:hover{border-color:var(--teal)}
    .qr-code-box{background:#fff;border-radius:8px;padding:8px}
    .qr-input{width:100%;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'DM Mono',monospace;font-size:14px}
    .qr-input:focus{outline:none;border-color:var(--teal)}
    .result-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
    .result-row:last-child{border-bottom:none}
    .gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .gate-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:420px}

    .gate-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem;line-height:1.6}
    .gate-input{width:100%;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:12px}
    .gate-input:focus{outline:none;border-color:var(--teal)}
    @media print{.sidebar,.topbar,.no-print{display:none!important}.main{margin-left:0;padding:0}.qr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.qr-asset-card{break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;color:#000!important}}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:99px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const PROXY = 'http://localhost:8888';

const api = async (method, endpoint, body=null) => {
  const token = localStorage.getItem('snipeit_token')||'';
  const opts = {
    method,
    headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json','Content-Type':'application/json'}
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(`${PROXY}/api/v1/${endpoint}`, opts);
  if(!r.ok) throw new Error(r.status);
  return r.json();
};

const initials = n => (n||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();

function Spinner(){return <span className="spinner"/>}

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div className={`toast ${type}`}>{type==='success'?'✅':'❌'} {msg}</div>;
}

function AiBadge({level}){
  const map={High:'badge-high',Medium:'badge-medium',Low:'badge-low',Unscored:'badge-unscored'};
  const dot={High:'🔴',Medium:'🟡',Low:'🟢',Unscored:'⚪'};
  const l=level||'Unscored';
  return <span className={`badge ${map[l]||'badge-unscored'}`}>{dot[l]||'⚪'} {l}</span>;
}

function StatusBadge({status}){
  const s=status||'—';
  const cls=s.includes('Maintenance')?'badge-maint':s.includes('Ready')?'badge-ready':s.includes('Deployed')?'badge-deployed':'badge-blue';
  return <span className={`badge ${cls}`}>{s}</span>;
}

function HealthBar({score}){
  const color=score<40?'#E24B4A':score<65?'#EF9F27':'#1D9E75';
  return <div style={{display:'flex',alignItems:'center',gap:8}}><div className="health-bar-bg"><div className="health-bar-fill" style={{width:`${score}%`,background:color}}/></div><span style={{fontSize:11,color,fontWeight:500,minWidth:32}}>{Math.round(score)}%</span></div>;
}

function getAiScore(a){return (a.custom_fields||{})['AI Priority Score']?.value||'Unscored';}

/* ── Checkout Modal ── */
function CheckoutModal({asset,users,onClose,onDone,showToast}){
  const [userId,setUserId]=useState('');
  const [note,setNote]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async()=>{
    if(!userId)return;
    setLoading(true);
    try{
      await api('POST',`hardware/${asset.id}/checkout`,{checkout_to_type:'user',assigned_user:parseInt(userId),note});
      showToast(`${asset.asset_tag} checked out successfully!`,'success');
      onDone();onClose();
    }catch(e){showToast('Checkout failed. Try again.','error');}
    setLoading(false);
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📤 Check Out Asset<span className="modal-close" onClick={onClose}>✕</span></div>
        <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 14px',marginBottom:'1rem',fontSize:13}}>
          <div><span className="mono">{asset.asset_tag}</span> — {asset.name}</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>{asset.category?.name} • {asset.location?.name}</div>
        </div>
        <div className="form-group">
          <label className="form-label">Assign to *</label>
          <select className="form-input" value={userId} onChange={e=>setUserId(e.target.value)}>
            <option value="">Select staff member...</option>
            {users.filter(u=>u.activated).map(u=>(
              <option key={u.id} value={u.id}>{u.name} — {u.department?.name||'No dept'}</option>
            ))}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Note (optional)</label>
          <input className="form-input" placeholder="e.g. Issued for AY 2026-2027" value={note} onChange={e=>setNote(e.target.value)}/>
        </div>
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={!userId||loading}>{loading?<Spinner/>:'Check Out'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Checkin Modal ── */
function CheckinModal({asset,onClose,onDone,showToast}){
  const [note,setNote]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async()=>{
    setLoading(true);
    try{
      await api('POST',`hardware/${asset.id}/checkin`,{note});
      showToast(`${asset.asset_tag} checked in successfully!`,'success');
      onDone();onClose();
    }catch(e){showToast('Check-in failed. Try again.','error');}
    setLoading(false);
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📥 Check In Asset<span className="modal-close" onClick={onClose}>✕</span></div>
        <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 14px',marginBottom:'1rem',fontSize:13}}>
          <div><span className="mono">{asset.asset_tag}</span> — {asset.name}</div>
          {asset.assigned_to&&<div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>Currently with: {asset.assigned_to.name}</div>}
        </div>
        <div className="form-group">
          <label className="form-label">Note (optional)</label>
          <input className="form-input" placeholder="e.g. Returned after semester" value={note} onChange={e=>setNote(e.target.value)}/>
        </div>
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>{loading?<Spinner/>:'Check In'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Maintenance Modal ── */
function MaintenanceModal({asset,onClose,onDone,showToast}){
  const [notes,setNotes]=useState('');
  const [type,setType]=useState('Repair');
  const [loading,setLoading]=useState(false);
  const KEYWORDS={High:['not working','broken','failed','crashed','hardware failure','no power','dead','sira','patay'],Medium:['slow','freezing','battery','charging','laggy'],Low:['update','cleaning','routine','inspection']};
  const getScore=n=>{
    const t=n.toLowerCase();
    if(KEYWORDS.High.some(k=>t.includes(k)))return'High';
    if(KEYWORDS.Medium.some(k=>t.includes(k)))return'Medium';
    if(KEYWORDS.Low.some(k=>t.includes(k)))return'Low';
    return'Unscored';
  };
  const score=getScore(notes);
  const scoreColor={High:'var(--red)',Medium:'var(--amber)',Low:'var(--teal)',Unscored:'var(--text3)'};
  const submit=async()=>{
    if(!notes)return;
    setLoading(true);
    try{
      await api('POST','maintenances',{asset_id:asset.id,title:notes.slice(0,50),maintenance_type:type,start_date:new Date().toISOString().split('T')[0],notes});
      // Update AI priority custom field
      try{await api('PATCH',`hardware/${asset.id}`,{_snipeit_ai_priority_score_2:score,_snipeit_maintenance_notes_4:notes});}catch(e){}
      showToast(`Maintenance ticket created — AI Score: ${score}`,'success');
      onDone();onClose();
    }catch(e){showToast('Failed to create ticket.','error');}
    setLoading(false);
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">🔧 Create Maintenance Ticket<span className="modal-close" onClick={onClose}>✕</span></div>
        <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 14px',marginBottom:'1rem',fontSize:13}}>
          <span className="mono">{asset.asset_tag}</span> — {asset.name}
        </div>
        <div className="form-group">
          <label className="form-label">Maintenance Type</label>
          <select className="form-input" value={type} onChange={e=>setType(e.target.value)}>
            {['Repair','Maintenance','Upgrade','Calibration','Battery Replacement','Software Support','Hardware Support'].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Issue Description *</label>
          <textarea className="form-input" rows={4} placeholder="Describe the issue in detail..." value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:'vertical'}}/>
        </div>
        {notes&&<div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 12px',fontSize:12,marginBottom:'1rem',display:'flex',alignItems:'center',gap:8}}>
          <span style={{color:'var(--text2)'}}>AI Priority Score:</span>
          <span style={{color:scoreColor[score],fontWeight:500}}>{score==='High'?'🔴':score==='Medium'?'🟡':score==='Low'?'🟢':'⚪'} {score}</span>
        </div>}
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={!notes||loading}>{loading?<Spinner/>:'Create Ticket'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Token Gate ── */
function TokenGate({onSave}){
  const [t,setT]=useState('');const [err,setErr]=useState('');const [testing,setTesting]=useState(false);
  const test=async()=>{
    setTesting(true);setErr('');
    try{localStorage.setItem('snipeit_token',t);const r=await api('GET','users/me');if(r.username){onSave(t);}else{setErr('Could not verify.');}}
    catch(e){setErr('Could not connect. Is proxy.py running?');localStorage.removeItem('snipeit_token');}
    setTesting(false);
  };
  return(<div className="gate-wrap"><div className="gate-card">
    <div style={{fontSize:28,marginBottom:12}}>🏛️</div>
    <div className="gate-title">Ascendia AMS</div>
    <div className="gate-sub">Make sure the proxy is running first:<br/><code style={{background:'var(--bg3)',padding:'2px 6px',borderRadius:4,fontSize:11}}>python3 proxy.py</code><br/><br/>Then enter any text below to connect.</div>
    <input className="gate-input" type="password" placeholder="Enter any text to connect..." value={t} onChange={e=>setT(e.target.value)} onKeyDown={e=>e.key==='Enter'&&test()}/>
    {err&&<div style={{fontSize:12,color:'var(--red)',marginBottom:10}}>{err}</div>}
    <button className="btn btn-primary" style={{width:'100%'}} onClick={test} disabled={!t||testing}>{testing?<Spinner/>:'Connect to Snipe-IT →'}</button>
  </div></div>);
}

function RequestsPage({users,assets,showToast}){
  const [type,setType]=useState('maintenance');

  const [submitted,setSubmitted]=useState([]);

  const update=k=>e=>setForm({...form,[k]:e.target.value});
  const submit=()=>{
    if(!form.user_name||(!form.description&&!form.reason))return;
    setLoading(true);
    const req={...form,type,submitted_at:new Date().toLocaleString(),status:'Pending',id:`REQ-${Date.now()}`};
    setSubmitted(prev=>[req,...prev]);
    showToast(`${type.charAt(0).toUpperCase()+type.slice(1)} request submitted!`,'success');
    setForm({asset_tag:'',user_name:'',description:'',priority:'Medium',reason:'',from_location:'',to_location:''});
    setLoading(false);
  };
  const types=[
    {id:'maintenance',label:'🔧 Maintenance',desc:'Report a broken or faulty asset'},

        </div>
        <div className="form-group">
          <label className="form-label">Priority</label>
          <select className="form-input" value={form.priority} onChange={update('priority')}>
            <option>Low</option><option>Medium</option><option>High</option>
          </select>
        </div>

        <div className="form-group">

function LicensePage({showToast}){
  const [licenses,setLicenses]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    api('GET','licenses?limit=50').then(d=>{setLicenses(d.rows||[]);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const getExpStatus=(exp)=>{
    if(!exp)return{label:'No expiry',cls:'badge-blue'};
    const expDate=exp?.date||exp;
    if(!expDate)return{label:'No expiry',cls:'badge-blue'};
    const days=(new Date(expDate)-new Date())/86400000;
    if(days<0)return{label:'Expired',cls:'badge-high'};
    if(days<30)return{label:`${Math.round(days)}d left`,cls:'badge-high'};
    if(days<90)return{label:`${Math.round(days)}d left`,cls:'badge-medium'};
    return{label:`${Math.round(days)}d left`,cls:'badge-ready'};
  };

  return(<>
    <div className="metrics" style={{gridTemplateColumns:'repeat(6,1fr)',marginBottom:14}}>
      <div className="metric-card"><div className="metric-top"><div className="metric-icon teal">📄</div></div><div className="metric-val">{licenses.length}</div><div className="metric-label">Total licenses</div></div>
      <div className="metric-card"><div className="metric-top"><div className="metric-icon blue">💺</div></div><div className="metric-val">{licenses.reduce((s,l)=>s+(l.seats||0),0)}</div><div className="metric-label">Total seats</div></div>
      <div className={`metric-card ${licenses.some(l=>{const exp=l.expiration_date?.date||l.expiration_date;const d=(new Date(exp)-new Date())/86400000;return d<30&&d>0;})?'alert':''}`}><div className="metric-top"><div className="metric-icon amber">⏰</div></div><div className="metric-val">{licenses.filter(l=>{const exp=l.expiration_date?.date||l.expiration_date;const d=(new Date(exp)-new Date())/86400000;return d<30&&d>0;}).length}</div><div className="metric-label">Expiring soon</div></div>

      {loading?<div style={{padding:'2rem',textAlign:'center'}}><Spinner/></div>:(
        <table className="tbl">
          <thead><tr><th>Name</th><th>Seats</th><th>Seats Used</th><th>Utilization</th><th>Expiry</th><th>Cost</th></tr></thead>

              <td>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div className="health-bar-bg"><div className="health-bar-fill" style={{width:`${util}%`,background:util>90?'#E24B4A':util>70?'#EF9F27':'#1D9E75'}}/></div>
                  <span style={{fontSize:11,color:'var(--text2)'}}>{util}%</span>
                </div>
              </td>
              <td><span className={`badge ${exp.cls}`}>{exp.label}</span></td>

function AnalyticsPage({assets,users}){
  const chartRef1=useRef(null);const chartRef2=useRef(null);const chartRef3=useRef(null);
  const inst1=useRef(null);const inst2=useRef(null);const inst3=useRef(null);

  const totalValue=assets.reduce((s,a)=>s+(parseFloat((a.purchase_cost||'0').toString().replace(/,/g,''))||0),0);
  const byCategory={};assets.forEach(a=>{const c=a.category?.name||'Other';byCategory[c]=(byCategory[c]||0)+1;});
  const byLocation={};assets.forEach(a=>{const l=a.location?.name||'Unknown';byLocation[l]=(byLocation[l]||0)+1;});
  const highAI=assets.filter(a=>getAiScore(a)==='High').length;
  const medAI=assets.filter(a=>getAiScore(a)==='Medium').length;
  const lowAI=assets.filter(a=>getAiScore(a)==='Low').length;
  const healthScores=Object.values(TELEMETRY).map(t=>t.health);
  const avgHealth=Math.round(healthScores.reduce((s,h)=>s+h,0)/healthScores.length);

  useEffect(()=>{
    if(!chartRef1.current)return;
    if(inst1.current)inst1.current.destroy();
    inst1.current=new Chart(chartRef1.current,{type:'doughnut',data:{labels:Object.keys(byCategory),datasets:[{data:Object.values(byCategory),backgroundColor:['#378ADD','#1D9E75','#EF9F27','#E24B4A','#9B59B6','#E67E22','#1ABC9C','#E74C3C','#3498DB','#2ECC71','#F39C12'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#8B90A0',font:{size:11}}}}}});
  },[JSON.stringify(byCategory)]);

  useEffect(()=>{
    if(!chartRef2.current)return;
    if(inst2.current)inst2.current.destroy();
    inst2.current=new Chart(chartRef2.current,{type:'bar',data:{labels:['High','Medium','Low','Unscored'],datasets:[{data:[highAI,medAI,lowAI,assets.length-highAI-medAI-lowAI],backgroundColor:['#E24B4A','#EF9F27','#1D9E75','#555B6E'],borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'#555B6E'},grid:{color:'rgba(255,255,255,0.05)'}},x:{ticks:{color:'#555B6E'},grid:{display:false}}}}});
  },[assets.length]);

  useEffect(()=>{
    if(!chartRef3.current)return;
    if(inst3.current)inst3.current.destroy();
    const locs=Object.keys(byLocation).slice(0,6);

        <div className="card-head"><span className="card-title">📈 System KPIs</span></div>
        {[['Total Assets',assets.length],['Total Staff',users.length],['Avg Health Score',`${avgHealth}%`],['High Priority Assets',highAI],['Total Inventory Value',`₱${Math.round(totalValue).toLocaleString()}`],['Assets per Staff',`${(assets.length/Math.max(users.length,1)).toFixed(1)}`],['Critical Devices (< 40%)',Object.values(TELEMETRY).filter(t=>t.health<40).length],['Healthy Devices (> 65%)',Object.values(TELEMETRY).filter(t=>t.health>=65).length]].map(([k,v])=>(
          <div className="result-row" key={k}><span style={{color:'var(--text2)',fontSize:12}}>{k}</span><span style={{fontWeight:500,fontSize:13}}>{v}</span></div>
        ))}
      </div>
    </div>
  </>);
}

/* ── Disposal / Retirement Page ── */
function DisposalPage({assets,users,showToast}){
  const [disposals,setDisposals]=useState([]);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({asset_id:'',asset_tag:'',asset_name:'',requested_by:'',reason:''});
  const [loading,setLoading]=useState(false);
  const update=k=>e=>{
    const val=e.target.value;
    if(k==='asset_id'){
      const a=assets.find(x=>x.id===parseInt(val));
      setForm({...form,asset_id:val,asset_tag:a?.asset_tag||'',asset_name:a?.name||''});
    } else setForm({...form,[k]:val});
  };

  const submit=async()=>{
    if(!form.asset_id||!form.requested_by||!form.reason)return;
    setLoading(true);
    try{
      await api('PATCH',`hardware/${form.asset_id}`,{status_id:4}); // Pending Retirement
      const disposal={...form,disposal_id:`DSP-${Date.now()}`,stage:'Pending Return',created_at:new Date().toLocaleString(),evidence:{asset_returned:false,data_wiped:false,disposal_cert:false,finance_approved:false}};
      setDisposals(prev=>[disposal,...prev]);
      showToast(`Disposal initiated for ${form.asset_tag}`,'success');
      setForm({asset_id:'',asset_tag:'',asset_name:'',requested_by:'',reason:''});
      setModal(false);
    }catch(e){showToast('Failed to initiate disposal','error');}
    setLoading(false);
  };

  const advance=(id,gate)=>{
    setDisposals(prev=>prev.map(d=>{
      if(d.disposal_id!==id)return d;
      const ev={...d.evidence,[gate]:true};
      const done=Object.values(ev).every(Boolean);
      return {...d,evidence:ev,stage:done?'Disposed':'In Progress'};
    }));
    showToast(`Evidence gate "${gate}" confirmed!`,'success');
  };

  return(<>
    <div className="metrics" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:14}}>
      <div className="metric-card"><div className="metric-top"><div className="metric-icon amber">🗑️</div></div><div className="metric-val">{disposals.length}</div><div className="metric-label">Active disposals</div></div>
      <div className="metric-card"><div className="metric-top"><div className="metric-icon teal">✅</div></div><div className="metric-val">{disposals.filter(d=>d.stage==='Disposed').length}</div><div className="metric-label">Completed</div></div>
      <div className="metric-card"><div className="metric-top"><div className="metric-icon red">⏳</div></div><div className="metric-val">{disposals.filter(d=>d.stage!=='Disposed').length}</div><div className="metric-label">Pending</div></div>
    </div>
    <div className="card" style={{marginBottom:14}}>
      <div className="card-head"><span className="card-title">🗑️ Disposal / Retirement Records</span><button className="btn btn-primary btn-sm" onClick={()=>setModal(true)}>+ Initiate Disposal</button></div>
      {disposals.length===0?<div style={{color:'var(--text3)',fontSize:13,padding:'1rem 0'}}>No active disposals. Click "+ Initiate Disposal" to start.</div>:(
        disposals.map(d=>(
          <div key={d.disposal_id} style={{background:'var(--bg3)',borderRadius:10,padding:'1rem',marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div><span className="mono">{d.asset_tag}</span> — <strong>{d.asset_name}</strong></div>
              <span className={`badge ${d.stage==='Disposed'?'badge-ready':'badge-medium'}`}>{d.stage}</span>
            </div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>Requested by: {d.requested_by} | Reason: {d.reason}</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {Object.entries(d.evidence).map(([gate,done])=>(
                <button key={gate} className={`btn btn-sm ${done?'btn-primary':''}`} style={{opacity:done?1:0.7}} onClick={()=>!done&&advance(d.disposal_id,gate)}>
                  {done?'✅':'⬜'} {gate.replace(/_/g,' ')}
                </button>
              ))}
            </div>
          </div>
        ))
      )}
    </div>
    {modal&&(
      <div className="modal-overlay" onClick={()=>setModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-title">🗑️ Initiate Disposal<span className="modal-close" onClick={()=>setModal(false)}>✕</span></div>
          <div className="form-group"><label className="form-label">Asset *</label>
            <select className="form-input" value={form.asset_id} onChange={update('asset_id')}>
              <option value="">Select asset to retire...</option>
              {assets.map(a=><option key={a.id} value={a.id}>{a.asset_tag} — {a.name}</option>)}
            </select>
          </div>
          <div className="form-group"><label className="form-label">Requested By *</label>
            <select className="form-input" value={form.requested_by} onChange={update('requested_by')}>
              <option value="">Select requestor...</option>
              {users.filter(u=>u.activated).map(u=><option key={u.id} value={u.name}>{u.name}</option>)}
            </select>
          </div>
          <div className="form-group"><label className="form-label">Reason *</label>
            <textarea className="form-input" rows={3} placeholder="e.g. Hardware failure — beyond economical repair" value={form.reason} onChange={update('reason')} style={{resize:'vertical'}}/>
          </div>
          <div className="modal-actions">
            <button className="btn" onClick={()=>setModal(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={submit} disabled={loading||!form.asset_id||!form.requested_by||!form.reason}>{loading?<Spinner/>:'Initiate Disposal'}</button>
          </div>
        </div>
      </div>
    )}
  </>);
}

    {checkout_id:'CHK-001',asset_tag:'AAI-2026-00002',asset_name:'Dell Latitude 5540',user_name:'Maria Santos',checkout_date:'2026-05-12 15:47',acknowledged:false},

  ]);

  const [form,setForm]=useState({asset_id:'',user_id:'',note:''});

      <div className="card-head"><span className="card-title">⏳ Pending Acknowledgments</span><button className="btn btn-primary btn-sm" onClick={()=>setNewChk(true)}>+ New Checkout</button></div>
      {unacknowledged.length===0?<div style={{color:'var(--teal)',fontSize:13,padding:'0.5rem 0'}}>✅ All checkouts acknowledged!</div>:(
        <table className="tbl">
          <thead><tr><th>Asset</th><th>Assigned to</th><th>Checkout Date</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>{unacknowledged.map(p=>(
            <tr key={p.checkout_id}>
              <td><span className="mono">{p.asset_tag}</span><div style={{fontSize:11,color:'var(--text3)'}}>{p.asset_name}</div></td>
              <td>{p.user_name}</td>
              <td style={{fontSize:11,color:'var(--text3)'}}>{p.checkout_date}</td>
              <td><span className="badge badge-medium">Pending</span></td>

            </tr>

        </table>

    </div>
    {acknowledged.length>0&&(
      <div className="card">
        <div className="card-head"><span className="card-title">✅ Acknowledged Checkouts</span></div>
        <table className="tbl">
          <thead><tr><th>Asset</th><th>Assigned to</th><th>Checkout Date</th><th>Acknowledged At</th></tr></thead>
          <tbody>{acknowledged.map(p=>(
            <tr key={p.checkout_id}>
              <td><span className="mono">{p.asset_tag}</span></td>
              <td>{p.user_name}</td>
              <td style={{fontSize:11,color:'var(--text3)'}}>{p.checkout_date}</td>
              <td style={{fontSize:11,color:'var(--teal)'}}>{p.acknowledged_at}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    )}
    {newChk&&(
      <div className="modal-overlay" onClick={()=>setNewChk(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-title">📤 New Digital Checkout<span className="modal-close" onClick={()=>setNewChk(false)}>✕</span></div>
          <div className="form-group"><label className="form-label">Asset *</label>
            <select className="form-input" value={form.asset_id} onChange={e=>setForm({...form,asset_id:e.target.value})}>
              <option value="">Select asset...</option>
              {assets.filter(a=>!a.assigned_to).map(a=><option key={a.id} value={a.id}>{a.asset_tag} — {a.name}</option>)}

          </div>

            <input className="form-input" placeholder="e.g. Issued for AY 2026-2027" value={form.note} onChange={e=>setForm({...form,note:e.target.value})}/>

      </div>
    )}

}

/* ── LMS / Class Schedule Page ── */
function LMSPage({assets}){
  const now=new Date();
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today=dayNames[now.getDay()];
  const currentTime=now.getHours()*100+now.getMinutes();
  const isActive=(day,time)=>{
    const dayMatch=day.split('/').some(d=>today.includes(d.trim()));
    const [start,end]=time.split('-').map(t=>{const[h,m]=t.split(':');return parseInt(h)*100+parseInt(m);});
    return dayMatch&&currentTime>=start&&currentTime<=end;
  };
  const isLaterToday=(day,time)=>{
    if(!day.split('/').some(d=>today.includes(d.trim())))return false;
    const[h,m]=time.split('-')[0].split(':');
    return parseInt(h)*100+parseInt(m)>currentTime;
  };
  const [schedules,setSchedules]=useState([
    {id:'SCH-001',course:'MSIT 631 — Advanced Systems Design',room:'QC-MAIN-LAB1',day:'Tuesday/Thursday',time:'09:00-11:00',instructor:'Miguel Torres',students:25,assets_needed:['Desktop','Projector'],critical:false},
    {id:'SCH-002',course:'CS 101 — Introduction to Programming',room:'QC-MAIN-LAB1',day:'Monday/Wednesday/Friday',time:'13:00-15:00',instructor:'Maria Santos',students:30,assets_needed:['Desktop'],critical:false},
    {id:'SCH-003',course:'Finance 201 — Financial Management',room:'QC-MAIN-CLASS101',day:'Tuesday/Thursday',time:'14:00-16:00',instructor:'Juan Dela Cruz',students:35,assets_needed:['Projector'],critical:false},
  ]);
  useEffect(()=>{
    fetch('http://localhost:8080/lms/schedules')
      .then(r=>r.json())
      .then(d=>{if(d.schedules&&d.schedules.length>0)setSchedules(d.schedules);})
      .catch(()=>{});
  },[]);

  const [lmsView,setLmsView]=useState('all');
  const tomorrowName=dayNames[(now.getDay()+1)%7];
  const isTomorrow=(day)=>day.split('/').some(d=>tomorrowName.includes(d.trim()));
  const isDone=(day,time)=>{
    const dayMatch=day.split('/').some(d=>today.includes(d.trim()));
    if(!dayMatch)return false;
    const end=time.split('-')[1];
    const[h,m]=end.split(':');
    return currentTime>parseInt(h)*100+parseInt(m);
  };
  const getLabAssets=(room)=>assets.filter(a=>(a.location?.name||'')===room);
  const getReadiness=(room,needed)=>{
    const roomAssets=getLabAssets(room);
    const issues=roomAssets.filter(a=>a.status_label?.name?.includes('Maintenance'));
    return{total:roomAssets.length,issues:issues.length,ready:roomAssets.length-issues.length};
  };

  return(<>
    <div className="metrics" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:14}}>
      <div className="metric-card" style={{cursor:'pointer'}} onClick={()=>setLmsView('all')}><div className="metric-top"><div className="metric-icon blue">📅</div></div><div className="metric-val">{schedules.length}</div><div className="metric-label">Active schedules</div></div>
      <div className={`metric-card ${schedules.filter(s=>s.critical).length>0?'alert':''}`} style={{cursor:'pointer'}} onClick={()=>setLmsView('critical')}><div className="metric-top"><div className="metric-icon red">⚠️</div></div><div className="metric-val">{schedules.filter(s=>s.critical).length}</div><div className="metric-label">Critical period classes</div></div>
      <div className="metric-card" style={{cursor:'pointer'}} onClick={()=>setLmsView('rooms')}><div className="metric-top"><div className="metric-icon teal">🏫</div></div><div className="metric-val">{[...new Set(schedules.filter(s=>isActive(s.day,s.time)).map(s=>s.room))].length}</div><div className="metric-label">Rooms in use now</div></div>
      <div className="metric-card" style={{cursor:'pointer'}} onClick={()=>setLmsView('upcoming')}><div className="metric-top"><div className="metric-icon amber">⏰</div></div><div className="metric-val">{schedules.filter(s=>isLaterToday(s.day,s.time)).length}</div><div className="metric-label">Upcoming today</div></div>
      <div className="metric-card" style={{cursor:'pointer'}} onClick={()=>setLmsView('done')}><div className="metric-top"><div className="metric-icon teal">✔️</div></div><div className="metric-val">{schedules.filter(s=>isDone(s.day,s.time)).length}</div><div className="metric-label">Done today</div></div>
      <div className="metric-card" style={{cursor:'pointer'}} onClick={()=>setLmsView('tomorrow')}><div className="metric-top"><div className="metric-icon blue">📆</div></div><div className="metric-val">{schedules.filter(s=>isTomorrow(s.day)).length}</div><div className="metric-label">Tomorrow's classes</div></div>
    </div>
    {lmsView==='rooms'&&(
      <div className="card" style={{marginBottom:14}}>
        <div className="card-head"><span className="card-title">🏫 Rooms in use</span><button className="btn btn-sm" onClick={()=>setLmsView('all')}>Show all</button></div>
        {[...new Set(schedules.filter(s=>isActive(s.day,s.time)).map(s=>s.room))].map(room=>{
          const roomAssets=assets.filter(a=>(a.location?.name||'')===room);
          const issues=roomAssets.filter(a=>a.status_label?.name?.includes('Maintenance'));
          const roomSchedules=schedules.filter(s=>s.room===room);
          return(<div key={room} style={{padding:'10px 0',borderBottom:'0.5px solid var(--border)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span className="mono" style={{fontWeight:500}}>{room}</span>
              <div style={{display:'flex',gap:10,fontSize:12}}>
                <span>📦 {roomAssets.length} assets</span>
                <span style={{color:'var(--teal)'}}>✅ {roomAssets.length-issues.length} ready</span>
                {issues.length>0&&<span style={{color:'var(--red)'}}>⚠️ {issues.length} issues</span>}
              </div>
            </div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>{roomSchedules.map(s=>s.course).join(' • ')}</div>
          </div>);
        })}
      </div>
    )}
    {lmsView==='upcoming'&&(
      <div className="card" style={{marginBottom:14}}>
        <div className="card-head"><span className="card-title">⏰ Upcoming Classes Today</span><button className="btn btn-sm" onClick={()=>setLmsView('all')}>Show all</button></div>
        {schedules.filter(s=>isLaterToday(s.day,s.time)).length===0
          ?<div style={{color:'var(--text3)',fontSize:13}}>No more classes today.</div>
          :schedules.filter(s=>isLaterToday(s.day,s.time)).map(s=>{
            const roomAssets=assets.filter(a=>(a.location?.name||'')===s.room);
            const issues=roomAssets.filter(a=>a.status_label?.name?.includes('Maintenance'));
            return(<div key={s.id} style={{padding:'10px 0',borderBottom:'0.5px solid var(--border)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:500,fontSize:14}}>{s.course}</div>
                  <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{s.time} • {s.instructor} • {s.students} students • {s.room}</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  {issues.length>0
                    ?<span className="badge badge-high">⚠️ {issues.length} issue(s)</span>
                    :<span className="badge badge-ready">✅ Ready</span>}
                </div>
              </div>
            </div>);
          })
        }
      </div>
    )}
    {lmsView==='done'&&(
      <div className="card" style={{marginBottom:14}}>
        <div className="card-head"><span className="card-title">✔️ Completed Classes Today</span><button className="btn btn-sm" onClick={()=>setLmsView('all')}>Show all</button></div>
        {schedules.filter(s=>isDone(s.day,s.time)).length===0
          ?<div style={{color:'var(--text3)',fontSize:13,padding:'0.5rem 0'}}>No completed classes today.</div>
          :schedules.filter(s=>isDone(s.day,s.time)).map(s=>(
            <div key={s.id} style={{padding:'10px 0',borderBottom:'0.5px solid var(--border)',opacity:0.7}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:500,fontSize:14}}>{s.course}</div>
                  <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{s.time} • {s.instructor} • {s.room}</div>
                </div>
                <span className="badge" style={{background:'var(--bg3)',color:'var(--text3)'}}>✔️ Done</span>
              </div>
            </div>
          ))
        }
      </div>
    )}
    {lmsView==='tomorrow'&&(
      <div className="card" style={{marginBottom:14}}>
        <div className="card-head"><span className="card-title">📆 Tomorrow's Schedule — {tomorrowName}</span><button className="btn btn-sm" onClick={()=>setLmsView('all')}>Show all</button></div>
        {schedules.filter(s=>isTomorrow(s.day)).length===0
          ?<div style={{color:'var(--text3)',fontSize:13,padding:'0.5rem 0'}}>No classes scheduled for tomorrow.</div>
          :schedules.filter(s=>isTomorrow(s.day)).map(s=>{
            const roomAssets=assets.filter(a=>(a.location?.name||'')===s.room);
            const issues=roomAssets.filter(a=>a.status_label?.name?.includes('Maintenance'));
            return(<div key={s.id} style={{padding:'10px 0',borderBottom:'0.5px solid var(--border)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:500,fontSize:14}}>{s.course}</div>
                  <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{s.time} • {s.instructor} • {s.students} students • {s.room}</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  {issues.length>0
                    ?<span className="badge badge-high">⚠️ {issues.length} issue(s)</span>
                    :<span className="badge badge-ready">✅ Ready</span>}
                </div>
              </div>
            </div>);
          })
        }
      </div>
    )}
    {lmsView==='critical'&&(
      <div className="card" style={{marginBottom:14}}>
        <div className="card-head"><span className="card-title">⚠️ Critical Period Classes</span><button className="btn btn-sm" onClick={()=>setLmsView('all')}>Show all</button></div>
        {schedules.filter(s=>s.critical).length===0?<div style={{color:'var(--teal)',fontSize:13}}>✅ No critical period classes.</div>:schedules.filter(s=>s.critical).map(s=>(<div key={s.id} style={{padding:'8px 0',borderBottom:'0.5px solid var(--border)',fontSize:13}}><strong>{s.course}</strong> — {s.room} • {s.day} {s.time}</div>))}
      </div>
    )}
    {schedules.map(s=>{
      const r=getReadiness(s.room,s.assets_needed);
      return(
        <div key={s.id} className="card" style={{marginBottom:14,border:isActive(s.day,s.time)?'1px solid var(--teal)':s.critical?'1px solid var(--red)':'1px solid var(--border)',background:isActive(s.day,s.time)?'var(--teal-dim)':'var(--bg2)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div>
              <div style={{fontWeight:500,fontSize:15}}>{s.course}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>{s.day} • {s.time} • {s.instructor} • {s.students} students</div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              {isDone(s.day,s.time)&&<span className="badge" style={{background:'var(--bg3)',color:'var(--text3)'}}>✔️ Done</span>}
              {!isDone(s.day,s.time)&&isActive(s.day,s.time)&&<span className="badge badge-ready">🟢 Active Now</span>}
              {isLaterToday(s.day,s.time)&&<span className="badge badge-blue">📅 Later Today</span>}
              {s.critical&&<span className="badge badge-high">🔴 Critical Period</span>}
              <span className="badge" style={{background:'var(--bg3)',color:'var(--text2)'}}>{s.room}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:16,fontSize:13}}>
            <span>📦 Assets needed: <strong>{s.assets_needed.join(', ')}</strong></span>
            <span>✅ Ready: <strong style={{color:'var(--teal)'}}>{r.ready}</strong></span>
            {r.issues>0&&<span>⚠️ Issues: <strong style={{color:'var(--red)'}}>{r.issues}</strong></span>}
          </div>
          {r.issues>0&&s.critical&&(
            <div style={{marginTop:10,padding:'8px 12px',background:'var(--red-dim)',borderRadius:8,fontSize:13,color:'var(--red)'}}>
              🔴 CRITICAL: Asset issues detected during finals period — escalate immediately to IT Support!
            </div>
          )}
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Assets in {s.room}:</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {getLabAssets(s.room).slice(0,6).map(a=>(
                <span key={a.id} className={`badge ${a.status_label?.name?.includes('Maintenance')?'badge-high':'badge-ready'}`} style={{fontSize:10}}>{a.asset_tag}</span>
              ))}
              {getLabAssets(s.room).length>6&&<span style={{fontSize:11,color:'var(--text3)'}}>+{getLabAssets(s.room).length-6} more</span>}
            </div>
          </div>
        </div>
      );
    })}
  </>);
}

/* ── App ── */
function App(){
  const [token,setToken]=useState(localStorage.getItem('snipeit_token')||'');
  const [page,setPage]=useState('dashboard');
  const [assets,setAssets]=useState([]);
  const [users,setUsers]=useState([]);
  const [locations,setLocations]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [toast,setToast]=useState(null);

  const showToast=(msg,type)=>setToast({msg,type});

  const loadData=useCallback(async()=>{
    if(!localStorage.getItem('snipeit_token'))return;
    setLoading(true);setError(null);
    try{
      const [a,u,l]=await Promise.all([api('GET','hardware?limit=500'),api('GET','users?limit=500'),api('GET','locations?limit=500')]);
      setAssets(a.rows||[]);setUsers(u.rows||[]);setLocations(l.rows||[]);
    }catch(e){setError('Cannot reach Snipe-IT.');}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{if(token)loadData();},[token]);

  if(!token)return <TokenGate onSave={t=>{setToken(t);}}/>;

  const nav=[
  {id:'dashboard',label:'Dashboard',icon:'📊'},
  {id:'assets',label:'Assets',icon:'🖥️'},
  {id:'telemetry',label:'Telemetry',icon:'📡'},
  {id:'users',label:'Staff',icon:'👨‍💼'},
  {id:'requests',label:'Requests',icon:'📝'},
  {id:'licenses',label:'Licenses',icon:'📄'},
  {id:'audit',label:'Audit Trail',icon:'📝'},
  {id:'analytics',label:'Analytics',icon:'📈'},
  {id:'disposal',label:'Disposal',icon:'🗑️'},
  {id:'acknowledgments',label:'Acknowledgments',icon:'✅'},
  {id:'lms',label:'LMS Schedule',icon:'📅'},
  {id:'qr',label:'QR Labels',icon:'🔲'},
  ];
  const titles={dashboard:'Dashboard',assets:'Assets',telemetry:'Telemetry',users:'Staff',qr:'QR Labels'};
  const subs={dashboard:'Live data — Snipe-IT + MongoDB + InfluxDB',assets:'Full inventory with checkout, checkin, maintenance & location',telemetry:'Live device health from InfluxDB',users:'Synced from HRIS',qr:'Generate & print QR labels'};

  return(<>
    <nav className="sidebar no-print">
     <div className="sidebar-logo" style={{cursor:'pointer'}} onClick={()=>setPage('dashboard')}><div className="logo-icon">🏛️</div><span style={{fontSize:14}}><span style={{display:"block",lineHeight:1.2}}>Ascendia</span><span style={{display:"block",lineHeight:1.2,fontSize:10,color:"var(--text2)",whiteSpace:"nowrap"}}>Asset Management System</span></span></div>
      <div className="nav-section">Main</div>
      {nav.map(n=>(<div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}><span style={{fontSize:16,width:18,textAlign:'center'}}>{n.icon}</span>{n.label}</div>))}
      <div className="sidebar-footer">
        <strong>Darwin Mari</strong>darwin.admin · IT Admin
        <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:6}}>
          <button className="btn btn-sm" style={{width:'100%'}} onClick={loadData}>{loading?<Spinner/>:'↻ Refresh'}</button>
          <button className="btn btn-sm" style={{width:'100%',color:'var(--red)'}} onClick={()=>{localStorage.removeItem('snipeit_token');setToken('');}}>Disconnect</button>
        </div>
      </div>
    </nav>
    <main className="main">
      <div className="topbar no-print">
        <div><div className="page-title">{titles[page]}</div><div className="page-sub">{subs[page]}</div></div>
        <div className="topbar-right">
          {loading&&<Spinner/>}
          {error&&<span style={{fontSize:12,color:'var(--red)'}}>{error}</span>}
          <span style={{fontSize:20,fontWeight:500,color:'var(--text)'}}>{new Date().toLocaleDateString('en-PH',{dateStyle:'medium'})}</span>
          {page==='assets'&&<button className="btn btn-primary" onClick={()=>window.open('http://snipe-it.test/hardware/create','_blank')}>+ New Asset</button>}
          {page==='users'&&<button className="btn btn-primary" onClick={()=>window.open('http://snipe-it.test/users/create','_blank')}>+ Staff</button>}
          
        </div>
      </div>
      {page==='dashboard'&&<Dashboard assets={assets} users={users} reload={loadData} showToast={showToast} setPage={setPage}/>}
      {page==='assets'&&<AssetsPage assets={assets} users={users} locations={locations} reload={loadData} showToast={showToast}/>}
      {page==='telemetry'&&<TelemetryPage/>}
      {page==='users'&&<UsersPage users={users}/>}
      {page==='requests'&&<RequestsPage users={users} assets={assets} showToast={showToast}/>}
      {page==='licenses'&&<LicensePage showToast={showToast}/>}
      {page==='audit'&&<AuditPage/>}
      {page==='analytics'&&<AnalyticsPage assets={assets} users={users}/>}
      {page==='disposal'&&<DisposalPage assets={assets} users={users} showToast={showToast}/>}
      {page==='acknowledgments'&&<AcknowledgmentsPage assets={assets} users={users} showToast={showToast}/>}
      {page==='lms'&&<LMSPage assets={assets}/>}
      {page==='qr'&&<QRPage assets={assets}/>}
      
    </main>
    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
